<div class="mx-auto mt-10 max-w-4xl">
  <div class="rounded-xl border border-gray-200 bg-white p-8 shadow-sm">
    <div class="mb-8">
      <h2 class="text-3xl font-bold text-gray-900">Add New Post</h2>
      <p class="mt-2 text-gray-500">Fill in the information below to create a new article.</p>
    </div>

    @if (article(); as article) {
      <form class="space-y-6">
        <!-- Title -->
        <div>
          <label for="title" class="mb-2 block text-sm font-semibold text-gray-700"> Title </label>

          <input
            type="text"
            id="title"
            name="title"
            [(ngModel)]="article.title"
            placeholder="Enter article title"
            class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
          />
        </div>

        <!-- Category -->
        <div>
          <label for="category" class="mb-2 block text-sm font-semibold text-gray-700">
            Category
          </label>

          <input
            type="text"
            id="category"
            name="category"
            [(ngModel)]="article.category"
            placeholder="Technology, Business, Lifestyle..."
            class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
          />
        </div>

        <!-- Content -->
        <div>
          <label for="content" class="mb-2 block text-sm font-semibold text-gray-700">
            Content
          </label>

          <textarea
            id="content"
            name="content"
            rows="10"
            [(ngModel)]="article.content"
            placeholder="Write your article here..."
            class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
          ></textarea>
        </div>

        <!-- Buttons -->
        <div class="flex items-center justify-end gap-3 border-t border-gray-200 pt-6">
          <button
            type="button"
            (click)="saveDraft()"
            class="rounded-lg border border-gray-300 px-6 py-2.5 font-medium text-gray-700 transition hover:bg-gray-100"
          >
            Save as Draft
          </button>

          <button
            type="button"
            (click)="publishArticle()"
            class="rounded-lg bg-blue-600 px-6 py-2.5 font-medium text-white transition hover:bg-blue-700"
          >
            Publish
          </button>
        </div>
      </form>
    }
  </div>
</div>
