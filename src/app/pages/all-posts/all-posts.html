<div class="mx-auto max-w-6xl p-8">
  <div class="mb-6 flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">All Posts</h1>
      <p class="mt-1 text-sm text-gray-500">Total Articles: {{ articles().length }}</p>
    </div>

    <a
      routerLink="/posts/new"
      class="rounded-lg bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700"
    >
      + Add New Post
    </a>
  </div>

  <div class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Title</th>

          <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Category</th>
        </tr>
      </thead>

      <tbody class="divide-y divide-gray-100 bg-white">
        @for (article of articles(); track article.id) {
          <tr class="transition hover:bg-gray-50">
            <td class="px-6 py-4">
              <p class="font-medium text-gray-900">
                {{ article.title }}
              </p>
            </td>

            <td class="px-6 py-4">
              <span class="rounded-full bg-gray-100 px-3 py-1 text-sm text-gray-700">
                {{ article.category }}
              </span>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="2" class="px-6 py-10 text-center text-gray-500">No articles found.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
