<div class="mx-auto max-w-6xl p-8">
  <div class="mb-6 flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">All Posts</h1>
      <p class="mt-1 text-sm text-gray-500">Total Articles: {{ articles().length }}</p>
    </div>

    <a
      routerLink="/posts/new"
      class="rounded-lg bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700"
    >
      + Add New Post
    </a>
  </div>

  <!-- Tabs -->
  <div class="mb-4 flex border-b border-gray-200">
    <div class="mb-4 flex border-b border-gray-200">
      <button
        class="border-b-2 px-5 py-3 font-medium transition"
        [class.border-blue-600]="activeTab === ArticleStatus.PUBLISH"
        [class.text-blue-600]="activeTab === ArticleStatus.PUBLISH"
        [class.border-transparent]="activeTab !== ArticleStatus.PUBLISH"
        [class.text-gray-500]="activeTab !== ArticleStatus.PUBLISH"
        (click)="setTab(ArticleStatus.PUBLISH)"
      >
        Published
      </button>

      <button
        class="border-b-2 px-5 py-3 font-medium transition"
        [class.border-blue-600]="activeTab === ArticleStatus.DRAFT"
        [class.text-blue-600]="activeTab === ArticleStatus.DRAFT"
        [class.border-transparent]="activeTab !== ArticleStatus.DRAFT"
        [class.text-gray-500]="activeTab !== ArticleStatus.DRAFT"
        (click)="setTab(ArticleStatus.DRAFT)"
      >
        Draft
      </button>

      <button
        class="border-b-2 px-5 py-3 font-medium transition"
        [class.border-blue-600]="activeTab === ArticleStatus.TRASH"
        [class.text-blue-600]="activeTab === ArticleStatus.TRASH"
        [class.border-transparent]="activeTab !== ArticleStatus.TRASH"
        [class.text-gray-500]="activeTab !== ArticleStatus.TRASH"
        (click)="setTab(ArticleStatus.TRASH)"
      >
        Trashed
      </button>
    </div>
  </div>

  <div class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Title</th>

          <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Category</th>

          <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Action</th>
        </tr>
      </thead>

      <tbody class="divide-y divide-gray-100 bg-white">
        @for (article of articles(); track article.id) {
          <tr class="transition hover:bg-gray-50">
            <td class="px-6 py-4">
              <p class="font-medium text-gray-900">
                {{ article.title }}
              </p>
            </td>

            <td class="px-6 py-4">
              <span class="rounded-full bg-gray-100 px-3 py-1 text-sm text-gray-700">
                {{ article.category }}
              </span>
            </td>

            <td class="px-6 py-4">
              <button
                class="mr-3 text-blue-600 hover:text-blue-800"
                [routerLink]="['/posts/edit', article.id]"
              >
                <mat-icon>edit</mat-icon>
              </button>

              <button class="text-red-600 hover:text-red-800" (click)="makeItTrash(article.id)">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="3" class="px-6 py-10 text-center text-gray-500">No articles found.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
