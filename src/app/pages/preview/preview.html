<h2>Preview Page</h2>

<div class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Title</th>

        <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Category</th>
      </tr>
    </thead>

    <tbody class="divide-y divide-gray-100 bg-white">
      @for (article of articles(); track article.id) {
        <tr class="transition hover:bg-gray-50">
          <td class="px-6 py-4">
            <p class="font-medium text-gray-900">
              {{ article.title }}
            </p>
          </td>

          <td class="px-6 py-4">
            <span class="rounded-full bg-gray-100 px-3 py-1 text-sm text-gray-700">
              {{ article.category }}
            </span>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="3" class="px-6 py-10 text-center text-gray-500">No articles found.</td>
        </tr>
      }
    </tbody>
  </table>

  <div class="flex items-center justify-between border-t border-gray-200 bg-white px-6 py-4">
    <button
      (click)="previousPage()"
      [disabled]="!hasPreviousPage()"
      class="rounded border px-4 py-2 disabled:cursor-not-allowed disabled:opacity-50"
    >
      Previous
    </button>

    <span class="text-sm text-gray-600"> Page {{ currentPage() }} of {{ totalPages() }} </span>

    <button
      (click)="nextPage()"
      [disabled]="!hasNextPage()"
      class="rounded border px-4 py-2 disabled:cursor-not-allowed disabled:opacity-50"
    >
      Next
    </button>
  </div>

  <div class="mb-4 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <label for="limit" class="text-sm text-gray-600"> Rows per page </label>

      <select
        id="limit"
        [value]="limit()"
        (change)="changeLimit($event)"
        class="rounded-lg border border-gray-300 px-3 py-2"
      >
        <option [value]="2">2</option>
        <option [value]="5">5</option>
        <option [value]="10">10</option>
        <option [value]="20">20</option>
        <option [value]="50">50</option>
      </select>
    </div>

    <span class="text-sm text-gray-600"> {{ total() }} articles </span>
  </div>
</div>
